services:
  - type: web
    name: cosy-api
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cosy-db
          property: connectionString
      - key: JWT_PRIVATE_KEY_PATH
        value: ./keys/jwt-private.pem
      - key: JWT_PUBLIC_KEY_PATH
        value: ./keys/jwt-public.pem
      - key: JWT_EXPIRES_IN
        value: 3600
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 604800
      - key: OTP_EXPIRES_IN
        value: 300
      - key: CORS_ORIGIN
        value: "*"
      - key: RATE_LIMIT_MAX
        value: 100
    disk:
      name: keys
      mountPath: /opt/render/project/src/keys
      sizeGB: 1

databases:
  - name: cosy-db
    databaseName: cosy_v0
    user: cosy_admin
    plan: starter
