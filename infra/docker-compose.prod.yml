version: "3.8"

services:
  api-gateway:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile.api-gateway
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - JSON_LOGS=true
      - KORA_API_KEY=${KORA_API_KEY}
      - KORA_SECRET_KEY=${KORA_SECRET_KEY}
      - FINCRA_API_KEY=${FINCRA_API_KEY}
      - FINCRA_SECRET_KEY=${FINCRA_SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
    restart: unless-stopped
    networks:
      - afm-network

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=afm_user
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=africa_frontier_markets
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U afm_user -d africa_frontier_markets"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - afm-network

  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - afm-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - afm-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - afm-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:

networks:
  afm-network:
    driver: bridge
