services:
  - type: web
    name: afm-prod-gateway-v23
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn api_gateway.main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        value: "{{ .Env.DATABASE_URL | replace "postgresql://" "postgresql+asyncpg://" }}"
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afm-redis-free
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: SECRET_KEY
        generateValue: true
