services:
  # API Gateway — Service Web
  - type: web
    name: afm-api-gateway
    runtime: python
    plan: standard
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: uvicorn api_gateway.main:app --host 0.0.0.0 --port $PORT --workers 4
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: afm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: afm-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: JSON_LOGS
        value: "true"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: DB_POOL_SIZE
        value: "20"
      - key: DB_MAX_OVERFLOW
        value: "30"
      - key: REDIS_POOL_SIZE
        value: "50"
      - key: ALLOWED_ORIGINS
        value: "https://africafrontiermarkets.com,https://app.africafrontiermarkets.com,https://afm-frontend.onrender.com"
      - key: ADS_SHARE
        value: "0.35"
      - key: CREATOR_SHARE
        value: "0.50"
      - key: PLATFORM_SHARE
        value: "0.15"
      - key: ENABLE_COPY_TRADING
        value: "true"
      - key: ENABLE_SOCIAL_TRADING
        value: "true"
      - key: MAX_COPY_ALLOCATION_PERCENT
        value: "100"
      - key: KORA_API_KEY
        sync: false
      - key: KORA_SECRET_KEY
        sync: false
      - key: FINCRA_API_KEY
        sync: false
      - key: FINCRA_SECRET_KEY
        sync: false
      - key: FLUTTERWAVE_PUBLIC_KEY
        sync: false
      - key: FLUTTERWAVE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: KORA_WEBHOOK_SECRET
        sync: false
      - key: FINCRA_WEBHOOK_SECRET
        sync: false

  # Worker — Background jobs
  - type: worker
    name: afm-worker
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m event_bus.worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: REDIS_URL
        fromService:
          type: redis
          name: afm-redis
          property: connectionString
      - key: DATABASE_URL
        fromDatabase:
          name: afm-postgres
          property: connectionString
      - key: LOG_LEVEL
        value: INFO
      - key: JSON_LOGS
        value: "true"

  # Static Site — Frontend vitrine
  - type: static_site
    name: afm-frontend
    buildCommand: echo "Frontend statique"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /
        destination: /africafrontiermarkets.html
      - type: rewrite
        source: /easymarkets
        destination: /easymarkets.html
    envVars:
      - key: API_BASE_URL
        value: "https://afm-api-gateway.onrender.com"

databases:
  - name: afm-postgres
    databaseName: africa_frontier_markets
    user: afm_user
    plan: standard
    region: frankfurt
    ipAllowList: []

redis:
  - name: afm-redis
    plan: starter
    region: frankfurt
    ipAllowList: []
