services:
  # 1. API Gateway — Point d'entrée sécurisé
  - type: web
    name: afm-api-gateway
    runtime: python
    plan: standard
    region: frankfurt
    buildCommand: |
      pip install -r requirements.txt
      alembic upgrade head
    startCommand: gunicorn api_gateway.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: afm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: afm-redis
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: JSON_LOGS
        value: "true"
      - key: DB_POOL_SIZE
        value: "20"
      - key: REDIS_POOL_SIZE
        value: "50"
      - key: ALLOWED_ORIGINS
        value: "https://africafrontiermarkets.com,https://app.africafrontiermarkets.com,https://afm-frontend.onrender.com"

  # 2. Worker — Traitement asynchrone (Paiements & Trading)
  - type: worker
    name: afm-worker
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: python -m event_bus.worker
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: afm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: afm-redis
          property: connectionString
      - key: LOG_LEVEL
        value: INFO

  # 3. Monitoring — Prometheus (Optionnel)
  - type: web
    name: afm-monitoring
    runtime: docker
    plan: starter
    region: frankfurt
    dockerfilePath: ./infra/prometheus/Dockerfile
    envVars:
      - key: API_TARGET
        value: "https://afm-api-gateway.onrender.com/metrics"

  # 4. Frontend — Site Vitrine & App (Type: web, Runtime: static)
  - type: web
    name: afm-frontend
    runtime: static
    buildCommand: echo "no build needed"
    staticPublishPath: ./frontend
    routes:
      - type: rewrite
        source: /
        destination: /africafrontiermarkets.html
      - type: rewrite
        source: /easymarkets
        destination: /easymarkets.html
    envVars:
      - key: API_BASE_URL
        value: "https://afm-api-gateway.onrender.com"

databases:
  - name: afm-postgres
    databaseName: africa_frontier_markets
    user: afm_user
    plan: standard
    region: frankfurt

redis:
  - name: afm-redis
    plan: starter
    region: frankfurt
