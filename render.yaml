services:
  # 1. Service unique combinant API + Worker (Plan Gratuit)
  - type: web
    name: afm-prod-gateway-v23
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: ./start_all.sh
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-db-v23
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afm-redis-v23
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO

  # 2. Render Key-Value (Redis compatible) - Offre gratuite
  - type: keyvalue
    name: afm-redis-v23
    plan: free
    region: frankfurt
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere

databases:
  - name: afm-db-v23
    plan: free
    region: frankfurt
