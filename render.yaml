services:
  - type: web
    name: afm-prod-gateway-v23
    runtime: python
    plan: free
    region: frankfurt
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "chmod +x ./start_all.sh && ./start_all.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-db-free
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: afm-redis-free
          property: connectionString
      - key: ENVIRONMENT
        value: production
      - key: LOG_LEVEL
        value: INFO
