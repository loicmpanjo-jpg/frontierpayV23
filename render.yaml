services:
  # 1. API Gateway
  - type: web
    name: afm-api-gateway
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: gunicorn api_gateway.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: afm-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: afm-redis
          property: connectionString

  # 2. Frontend (Serveur statique via Python pour éviter les erreurs de type Render)
  - type: web
    name: afm-frontend
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: "echo 'No build needed'"
    startCommand: "python3 -m http.server $PORT --directory frontend"
    envVars:
      - key: API_BASE_URL
        value: "https://afm-api-gateway.onrender.com"

databases:
  - name: afm-postgres
    plan: starter
    region: frankfurt

redis:
  - name: afm-redis
    plan: starter
    region: frankfurt
