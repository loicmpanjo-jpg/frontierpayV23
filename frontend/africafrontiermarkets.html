      padding: 4px 10px;
      border-radius: 6px;

      background: transparent;
      color: var(--soft);
      font-family: 'Inter', sans-serif;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.2s;

    .tabs button:hover { background: var(--tint); color: var(--deep); }
    .tabs button.active { background: var(--deep); color: white; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .hero {

    .badge {

    .badge-success { background: var(--good-bg); color: var(--good); }

      gap: 8px;
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      font-family: 'Inter', sans-serif;

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

    .sub-tabs { display: flex; gap: 4px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }
    .sub-tabs button { padding: 6px 14px; border: none; background: transparent; color: var(--soft); font-family: 'Inter', sans-serif; font-weight: 500; font-size: 0.85rem; cursor: pointer; border-radius: 6px; }

// ===== EVENT LISTENERS =====

document.addEventListener('DOMContentLoaded', () => {
  const main = document.getElementById('main');
  const tabs = document.getElementById('tabs');

  function renderTab(tab) {
    switch(tab) {
      case 'plateforme': main.innerHTML = renderPlateforme(); break;
      case 'frontierpay': main.innerHTML = renderFrontierPay(); break;
      case 'easymarket':
        main.innerHTML = renderEasyMarket();
        setupEMTabs();
        break;
      case 'fintech': main.innerHTML = renderFintech(); break;
      case 'levee': main.innerHTML = renderLevee(); break;
    }
  }

  function setupEMTabs() {
    const emTabs = document.getElementById('em-tabs');
    const emContent = document.getElementById('em-content');
    if (!emTabs || !emContent) return;

    function renderEM(tab) {
      switch(tab) {
        case 'dashboard': emContent.innerHTML = renderEMDashboard(); break;
        case 'marches': emContent.innerHTML = renderEMMarches(); break;
        case 'watchlist': emContent.innerHTML = renderEMWatchlist(); break;
        case 'ordres': emContent.innerHTML = renderEMOrdres(); break;
        case 'social': emContent.innerHTML = renderEMSocial(); break;
        case 'copy': emContent.innerHTML = renderEMCopy(); break;
      }
    }

    emTabs.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        emTabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderEM(btn.dataset.em);
      });
    });

    renderEM('dashboard');
  }

  tabs.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', () => {
      tabs.querySelectorAll('button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTab(btn.dataset.tab);
    });
  });

  renderTab('plateforme');
});

function filterMarkets(region) {
  const rows = document.querySelectorAll('#markets-table tr[data-region]');
  rows.forEach(row => {
    if (region === 'all' || row.dataset.region === region) {
      row.style.display = '';
    } else {
      row.style.display = 'none';
    }
  });
}
