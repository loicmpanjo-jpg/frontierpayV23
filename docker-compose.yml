version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://fp:fp@postgres/frontierpay_v23
      - REDIS_URL=redis://redis:6379/0
      - MODE=orchestrator
      - KORA_BASE_URL=https://api.korapay.com
      - FINCRA_BASE_URL=https://api.fincra.com
    depends_on:
      - postgres
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4

  worker:
    build: .
    environment:
      - DATABASE_URL=postgresql+asyncpg://fp:fp@postgres/frontierpay_v23
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      - postgres
      - redis
    command: celery -A app.workers.tasks worker --loglevel=info

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=fp
      - POSTGRES_PASSWORD=fp
      - POSTGRES_DB=frontierpay_v23
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
      - "14268:14268"

volumes:
  postgres_data:
